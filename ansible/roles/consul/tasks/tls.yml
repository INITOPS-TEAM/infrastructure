---
- name: Create certs directory on first consul server
  file:
    path: "{{ consul_cert_home }}"
    state: directory
    mode: '0755'
  delegate_to: "{{ groups['consul'][0] }}"
  run_once: true

- name: Generate CA certificate
  shell: |
    cd {{ consul_cert_home }}
    consul tls ca create
  args:
    creates: "{{ consul_cert_home }}/consul-agent-ca.pem"
  delegate_to: "{{ groups['consul'][0] }}"
  run_once: true

- name: Generate server certificate
  shell: |
    cd {{ consul_cert_home }}
    consul tls cert create -server -dc={{ consul_datacenter }}
  args:
    creates: "{{ consul_cert_home }}/{{ consul_datacenter }}-server-consul-0.pem"
  delegate_to: "{{ groups['consul'][0] }}"
  run_once: true

- name: Generate client certificate
  shell: |
    cd {{ consul_cert_home }}
    consul tls cert create -client -dc={{ consul_datacenter }}
  args:
    creates: "{{ consul_cert_home }}/{{ consul_datacenter }}-client-consul-0.pem"
  delegate_to: "{{ groups['consul'][0] }}"
  run_once: true

- name: Fetch certs to control node (staging)
  fetch:
    src: "{{ consul_cert_home }}/{{ item }}"
    dest: "/tmp/consul-certs-local/"
    flat: yes
  delegate_to: "{{ groups['consul'][0] }}"
  run_once: true
  loop:
    - consul-agent-ca.pem
    - "{{ consul_datacenter }}-server-consul-0.pem"
    - "{{ consul_datacenter }}-server-consul-0-key.pem"
    - "{{ consul_datacenter }}-client-consul-0.pem"
    - "{{ consul_datacenter }}-client-consul-0-key.pem"

- name: Create certs directory on all hosts
  file:
    path: "{{ consul_cert_home }}"
    state: directory
    owner: consul
    group: consul
    mode: '0755'

- name: Distribute public certificates to all hosts
  copy:
    src: "/tmp/consul-certs-local/{{ item }}"
    dest: "{{ consul_cert_home }}/{{ item }}"
    owner: consul
    group: consul
    mode: '0644'
  loop:
    - consul-agent-ca.pem
    - "{{ consul_datacenter }}-server-consul-0.pem"
    - "{{ consul_datacenter }}-client-consul-0.pem"

- name: Distribute private keys with restricted permissions
  copy:
    src: "/tmp/consul-certs-local/{{ item }}"
    dest: "{{ consul_cert_home }}/{{ item }}"
    owner: consul
    group: consul
    mode: '0600'
  loop:
    - "{{ consul_datacenter }}-server-consul-0-key.pem"
    - "{{ consul_datacenter }}-client-consul-0-key.pem"
  notify: Restart consul
